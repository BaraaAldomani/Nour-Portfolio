# Local dev stack, structured to match the sibling sites on this machine
# (baraa-website, rouaa-website): app + nginx + db + node, one project name,
# env-var ports. This site's defaults are nginx 8082, postgres 5434, vite 5175
# so all three stacks run simultaneously.
name: nour-website

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    volumes:
      - .:/var/www/html
      # Unlike the siblings, vendor/ lives in a named volume rather than on the
      # Windows bind mount. Walking the ~13k vendor files over the host mount
      # costs ~45s per request with OPcache off (which dev needs -- see the
      # Dockerfile); from the VM's own filesystem it is milliseconds. Trade-off:
      # the host cannot see vendor/, so IDE indexing needs a local
      # `composer install` (gitignored either way).
      - vendor:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8082}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nour}
      POSTGRES_USER: ${DB_USERNAME:-nour}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_FORWARD_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nour} -d ${DB_DATABASE:-nour}"]
      interval: 5s
      timeout: 3s
      retries: 10

  node:
    image: node:22-alpine
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/var/www/html
      - node_modules:/var/www/html/node_modules
    ports:
      - "${VITE_PORT:-5175}:5175"

volumes:
  pgdata:
  vendor:
  node_modules:
