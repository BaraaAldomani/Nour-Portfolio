name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql,intl,gd,zip,bcmath
          coverage: none

      - name: Install Composer dependencies
        run: |
          composer install \
            --no-dev \
            --prefer-dist \
            --no-interaction \
            --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy files
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.SSH_PORT }}" \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.env \
            --exclude=storage/logs \
            --exclude=storage/framework/cache \
            --exclude=storage/framework/sessions \
            --exclude=storage/framework/views \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${DEPLOY_PATH}"

      - name: Run Laravel commands
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 \
              -p "${{ secrets.SSH_PORT }}" \
              "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" <<EOF

          set -e

          PHP_BIN=/usr/bin/php8.3

          cd "${DEPLOY_PATH}"

          if [ -f ".env.encrypted" ]; then
              export LARAVEL_ENV_ENCRYPTION_KEY="${{ secrets.LARAVEL_ENV_ENCRYPTION_KEY }}"
              \$PHP_BIN artisan env:decrypt --force
          fi

          rm -f bootstrap/cache/*.php

          \$PHP_BIN artisan optimize:clear

          \$PHP_BIN artisan migrate --force

          \$PHP_BIN artisan cache:clear

          if [ ! -L public/storage ]; then
              \$PHP_BIN artisan storage:link
          fi

          # Only for Filament v3
          # \$PHP_BIN artisan filament:assets

          \$PHP_BIN artisan config:cache
          \$PHP_BIN artisan route:cache

          EOF