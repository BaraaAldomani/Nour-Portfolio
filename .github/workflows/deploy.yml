name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # A second push while a deploy is mid-flight would interleave rsync with
  # artisan migrate on the server. Queue them instead.
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          # Must match the platform pin in composer.json. Resolving under 8.4
          # pulls Symfony 8, which then fatals on an 8.3 runtime.
          php-version: '8.3'
          extensions: pdo_mysql, pdo_sqlite, intl, gd, zip, bcmath
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run the test suite
        run: php artisan test

  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, intl, gd, zip, bcmath
          coverage: none

      - name: Install PHP dependencies (production)
        run: composer install --no-interaction --prefer-dist --no-progress --no-dev --optimize-autoloader

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Build front-end assets
        run: |
          npm ci
          npm run build

      - name: Add the deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='.env' \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${DEPLOY_PATH}/"

      - name: Run post-deploy commands
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_ed25519 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' \
             LARAVEL_ENV_ENCRYPTION_KEY='${{ secrets.LARAVEL_ENV_ENCRYPTION_KEY }}' \
             bash -s" <<'REMOTE'
          set -euo pipefail

          # Shared hosting defaults to PHP 8.2; be explicit or the app boots on
          # the wrong runtime.
          PHP_BIN="${PHP_BIN:-/usr/bin/php8.3}"

          cd "$DEPLOY_PATH"

          # Config ships through git, encrypted, and is decrypted here. Nobody
          # edits .env over SSH.
          "$PHP_BIN" artisan env:decrypt --force --key="$LARAVEL_ENV_ENCRYPTION_KEY"

          # Purge with plain rm BEFORE any artisan call. A stale cached config
          # makes providers boot against outdated config and crash, and at that
          # point `artisan config:clear` cannot run either.
          rm -f bootstrap/cache/*.php

          # File-based clears first...
          "$PHP_BIN" artisan config:clear
          "$PHP_BIN" artisan route:clear
          "$PHP_BIN" artisan view:clear

          # ...then migrate...
          "$PHP_BIN" artisan migrate --force

          # ...and only then the DB-backed cache clear. Reversing these two on a
          # fresh database fails: the cache store's own table does not exist yet.
          "$PHP_BIN" artisan cache:clear

          "$PHP_BIN" artisan filament:assets
          "$PHP_BIN" artisan storage:link || true

          "$PHP_BIN" artisan config:cache
          "$PHP_BIN" artisan route:cache
          "$PHP_BIN" artisan view:cache

          # NOTE: db:seed and app:create-admin are deliberately absent.
          # They are first-deploy-only, run by hand. Seeding a live site would
          # overwrite everything edited in the dashboard.
          REMOTE
